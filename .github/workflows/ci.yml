name: Сиай
on:
  pull_request:
  push:
    branches: [ main ]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Tests
        run: pytest -q

      - name: Pre-commit (all files)
        run: pre-commit run -a

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt -r requirements-dev.txt --strict

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          chmod 777 db/
          docker compose -f docker/compose.yml up --build -d
          sleep 1
          curl --fail http://localhost:8000/health


  deploy:
    runs-on: ubuntu-latest
    needs: [ docker-build, pip-audit ]
#    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install rsync and ssh client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$NAS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync project to NAS
        env:
          NAS_DEPLOY_PATH: ${{ secrets.NAS_DEPLOY_PATH }}
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PORT: ${{ secrets.NAS_PORT }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${NAS_PORT:-22} -o StrictHostKeyChecking=no" \
            ./ ${NAS_USER}@${NAS_HOST}:${NAS_DEPLOY_PATH}/

      - name: Run docker compose on NAS
        env:
          NAS_DEPLOY_PATH: ${{ secrets.NAS_DEPLOY_PATH }}
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PORT: ${{ secrets.NAS_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${NAS_PORT:-22} -o StrictHostKeyChecking=no \
            ${NAS_USER}@${NAS_HOST} \
            "cd ${NAS_DEPLOY_PATH} && mkdir -p db && chmod 777 db && docker compose -f docker/compose.yml up -d --build"
